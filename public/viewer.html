<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprints CLI - Viewer</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" style="width: 320px;">
            <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                <div class="nav-brand">
                    <svg style="width: 2rem; height: 2rem; color: var(--secondary-accent); margin-bottom: 0.5rem;" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path clip-rule="evenodd" d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z" fill="currentColor" fill-rule="evenodd"></path>
                    </svg>
                    <h1>Blueprints</h1>
                </div>
                
                <!-- Search Input -->
                <div class="search-input">
                    <svg class="search-icon" fill="currentColor" height="20" viewBox="0 0 256 256" width="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path>
                    </svg>
                    <input id="blueprintSearch" class="form-input" placeholder="Search blueprints..." type="search">
                </div>
            </div>

            <!-- Blueprint List -->
            <nav id="blueprintList" style="flex: 1; overflow-y: auto;">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading blueprints...
                </div>
            </nav>
        </aside>
        
        <main style="flex: 1; display: flex; flex-direction: column;">
            <!-- Header -->
            <header style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border-color);">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="menuToggle" class="btn btn-secondary" style="padding: 0.5rem;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16M4 18h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                    </button>
                    <nav class="nav-menu" style="flex-direction: row;">
                        <a class="nav-item" href="/" style="padding: 0.5rem 1rem;">
                            <svg fill="currentColor" height="20" viewBox="0 0 256 256" width="20" xmlns="http://www.w3.org/2000/svg">
                                <path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path>
                            </svg>
                            <span>Search</span>
                        </a>
                        <a class="nav-item" href="/generator" style="padding: 0.5rem 1rem;">
                            <svg fill="currentColor" height="20" viewBox="0 0 256 256" width="20" xmlns="http://www.w3.org/2000/svg">
                                <path d="M248,152a8,8,0,0,1-8,8H224v16a8,8,0,0,1-16,0V160H192a8,8,0,0,1,0-16h16V128a8,8,0,0,1,16,0v16h16A8,8,0,0,1,248,152ZM56,72H72V88a8,8,0,0,0,16,0V72h16a8,8,0,0,0,0-16H88V40a8,8,0,0,0-16,0V56H56a8,8,0,0,0,0,16ZM184,192h-8v-8a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16h8v8a8,8,0,0,0,16,0v-8h8a8,8,0,0,0,0-16ZM219.31,80,80,219.31a16,16,0,0,1-22.62,0L36.68,198.63a16,16,0,0,1,0-22.63L176,36.69a16,16,0,0,1,22.63,0l20.68,20.68A16,16,0,0,1,219.31,80ZM208,68.69,187.31,48l-32,32L176,100.69Z"></path>
                            </svg>
                            <span>Generate</span>
                        </a>
                        <a class="nav-item" href="/submission" style="padding: 0.5rem 1rem;">
                            <svg fill="currentColor" height="20" viewBox="0 0 256 256" width="20" xmlns="http://www.w3.org/2000/svg">
                                <path d="M184,32H72A16,16,0,0,0,56,48V224a8,8,0,0,0,12.24,6.78L128,193.43l59.77,37.35A8,8,0,0,0,200,224V48A16,16,0,0,0,184,32Zm0,16V161.57l-51.77-32.35a8,8,0,0,0-8.48,0L72,161.56V48ZM132.23,177.22a8,8,0,0,0-8.48,0L72,209.57V180.43l56-35,56,35v29.14Z"></path>
                            </svg>
                            <span>Submit</span>
                        </a>
                    </nav>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="newBlueprintBtn" class="btn btn-primary">
                        <svg fill="currentColor" height="16" viewBox="0 0 256 256" width="16" xmlns="http://www.w3.org/2000/svg">
                            <path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path>
                        </svg>
                        New Blueprint
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div style="flex: 1; display: flex; overflow: hidden;">
                <!-- Main Content -->
                <div style="flex: 1; overflow-y: auto; padding: 2rem;">
                    <div id="blueprintContent" style="max-width: 1024px; margin: 0 auto;">
                        <!-- Default state -->
                        <div id="emptyState" class="text-center" style="padding: 4rem 2rem; color: var(--text-secondary);">
                            <svg style="width: 4rem; height: 4rem; margin: 0 auto 1rem; color: var(--text-secondary);" fill="currentColor" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                                <path d="M181.66,146.34a8,8,0,0,1,0,11.32l-24,24a8,8,0,0,1-11.32-11.32L164.69,152l-18.35-18.34a8,8,0,0,1,11.32-11.32Zm-72-24a8,8,0,0,0-11.32,0l-24,24a8,8,0,0,0,0,11.32l24,24a8,8,0,0,0,11.32-11.32L91.31,152l18.35-18.34A8,8,0,0,0,109.66,122.34ZM216,88V216a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V40A16,16,0,0,1,56,24h96a8,8,0,0,1,5.66,2.34l56,56A8,8,0,0,1,216,88Zm-56-8h28.69L160,51.31Zm40,136V96H152a8,8,0,0,1-8-8V40H56V216H200Z"></path>
                            </svg>
                            <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;">Select a Blueprint</h3>
                            <p>Choose a blueprint from the sidebar to view its details and code.</p>
                        </div>

                        <!-- Blueprint Details (hidden by default) -->
                        <div id="blueprintDetails" class="hidden">
                            <!-- Header -->
                            <div class="mb-8">
                                <h2 id="blueprintTitle" class="card-title" style="font-size: 2rem; margin-bottom: 0.5rem;"></h2>
                                <p id="blueprintLastUpdated" class="text-secondary"></p>
                            </div>

                            <!-- Error/Success Messages -->
                            <div id="messages"></div>

                            <!-- Metadata Section -->
                            <section class="mb-8">
                                <h3 class="card-title" style="font-size: 1.25rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                                    Metadata
                                </h3>
                                <div id="metadataContent" style="display: grid; gap: 1rem;">
                                    <!-- Metadata will be populated here -->
                                </div>
                            </section>

                            <!-- Code Section -->
                            <section class="mb-8">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                                    <h3 class="card-title" style="font-size: 1.25rem;">Code</h3>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button id="copyCodeBtn" class="btn btn-secondary" style="font-size: 0.875rem;">
                                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                                                <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                                            </svg>
                                            Copy
                                        </button>
                                        <button id="editBlueprintBtn" class="btn btn-secondary" style="font-size: 0.875rem;">
                                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708L10.5 8.207l-3-3L12.146.146zM11.207 9.207l-3-3L2.5 11.914v3h3l5.707-5.707z"/>
                                            </svg>
                                            Edit
                                        </button>
                                        <button id="regenerateBlueprintBtn" class="btn btn-accent" style="font-size: 0.875rem;">
                                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
                                                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
                                                <path d="M5 3v4"></path>
                                                <path d="M19 17v4"></path>
                                                <path d="M3 5h4"></path>
                                                <path d="M17 19h4"></path>
                                            </svg>
                                            Regenerate
                                        </button>
                                    </div>
                                </div>
                                <div id="codeContent" class="code-block">
                                    <!-- Code will be populated here -->
                                </div>
                            </section>

                            <!-- Action Buttons -->
                            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                                <button id="deleteBtn" class="btn" style="background: rgba(178, 34, 34, 0.1); color: #ff6b6b; border: 1px solid rgba(178, 34, 34, 0.3);">
                                    Delete
                                </button>
                                <a href="/generator" class="btn btn-primary">
                                    Generate Similar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/viewer.js"></script>
</body>
</html>
