        <main class="main-content">
            <div class="card">
                <div class="card-header">
                    <h1 class="card-title">Generate Code</h1>
                </div>

                <!-- Error/Success Messages -->
                <div id="messages"></div>

                <!-- Generation Form -->
                <form id="generationForm">
                    <div class="form-group">
                        <label class="form-label" for="promptInput">Describe what you want to generate</label>
                        <textarea 
                            id="promptInput" 
                            class="form-textarea" 
                            style="min-height: 120px;"
                            placeholder="Enter a prompt to generate code, e.g., 'Create a React component for a user profile card with avatar, name, and bio'"
                            required
                        ></textarea>
                    </div>

                    <!-- Configuration Options -->
                    <div class="mb-8">
                        <h3 class="card-title" style="font-size: 1.25rem; margin-bottom: 1rem;">Configuration</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label" for="languageSelect">Language</label>
                                <select id="languageSelect" class="form-select">
                                    <option value="javascript">JavaScript</option>
                                    <option value="python">Python</option>
                                    <option value="ruby">Ruby</option>
                                    <option value="go">Go</option>
                                    <option value="java">Java</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="frameworkSelect">Framework</label>
                                <select id="frameworkSelect" class="form-select">
                                    <option value="react">React</option>
                                    <option value="vue">Vue.js</option>
                                    <option value="angular">Angular</option>
                                    <option value="svelte">Svelte</option>
                                    <option value="none">None</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="styleSelect">Styling</label>
                                <select id="styleSelect" class="form-select">
                                    <option value="tailwind">Tailwind CSS</option>
                                    <option value="styled-components">Styled Components</option>
                                    <option value="css-modules">CSS Modules</option>
                                    <option value="plain-css">Plain CSS</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                        <button type="button" id="clearBtn" class="btn btn-secondary">Clear</button>
                        <button type="submit" id="generateBtn" class="btn btn-primary">
                            <span id="generateBtnText">Generate</span>
                            <div id="generateSpinner" class="spinner hidden" style="margin: 0;"></div>
                        </button>
                    </div>
                </form>

                <!-- Generated Code Section -->
                <div id="generatedCodeSection" class="hidden" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 class="card-title" style="font-size: 1.25rem;">Generated Code</h3>
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="copyCodeBtn" class="btn btn-secondary" style="font-size: 0.875rem;">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                                    <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                                </svg>
                                Copy
                            </button>
                            <button id="saveAsBlueprint" class="btn btn-accent" style="font-size: 0.875rem;">
                                Save as Blueprint
                            </button>
                        </div>
                    </div>
                    <div id="generatedCode" class="code-block">
                        <!-- Generated code will appear here -->
                    </div>
                </div>

                <!-- Relevant Blueprints Section -->
                <div class="mb-8" style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                    <h3 class="card-title" style="font-size: 1.25rem; margin-bottom: 1rem;">Relevant Blueprints</h3>
                    <div id="relevantBlueprints" class="blueprint-grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading relevant blueprints...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/generator.js"></script>
