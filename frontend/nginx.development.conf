# Development Nginx Configuration for BlueprintsCLI Frontend
# Optimized for development workflow with live reloading support

# Upstream backend for development
upstream backend_dev {
    server backend-dev:3000;
    keepalive 4;
}

server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Development logging
    access_log /var/log/nginx/dev_access.log combined;
    error_log /var/log/nginx/dev_error.log debug;

    # Disable caching for development
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";

    # =============================================================================
    # API Proxy for Development Backend
    # =============================================================================
    location /api/ {
        proxy_pass http://backend_dev/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Development-friendly timeouts
        proxy_connect_timeout 1s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering for immediate response
        proxy_buffering off;
        
        # CORS headers for development
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Allow-Credentials true always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # =============================================================================
    # Health Check Endpoint
    # =============================================================================
    location /health {
        access_log off;
        return 200 "frontend-dev healthy\n";
        add_header Content-Type text/plain;
    }

    # =============================================================================
    # Static Asset Serving with No Caching
    # =============================================================================
    
    # Static assets - no caching in development
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        # Enable CORS for assets in development
        add_header Access-Control-Allow-Origin "*" always;
    }

    # HTML files - no caching
    location ~* \.html$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        
        # No caching for main routes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # =============================================================================
    # Development Features
    # =============================================================================
    
    # Enable gzip for development (lighter than production)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json;

    # Development-friendly error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 @error_json;
    
    location @error_json {
        default_type application/json;
        return 500 '{"error": "Internal server error in development", "timestamp": "$time_iso8601"}';
    }

    # Allow access to dot files in development (for debugging)
    location ~ /\.(?!well-known) {
        allow all;
    }
}