<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Blueprints CLI</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="bg-[var(--primary-background)] text-[var(--text-light-gray)]">
<div class="flex h-screen">
    <aside class="w-64 bg-black bg-opacity-20 p-6 flex flex-col justify-between">
        <div>
            <div class="mb-8">
                <h1 class="text-xl font-bold text-white">Blueprints CLI</h1>
                <span class="text-sm text-[var(--text-secondary)]">v1.0.0</span>
            </div>
            <nav class="flex flex-col gap-2">
                <a class="flex items-center gap-3 px-4 py-2 rounded-lg bg-[var(--surface-panels)] text-white" href="/">
                    <svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M168,112a56,56,0,1,1-56-56A56,56,0,0,1,168,112Zm61.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88,88,0,1,1,11.32-11.31l50.06,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z"></path>
                    </svg>
                    <span>Search</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-[var(--surface-panels)]" href="generator.html">
                    <svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M248,152a8,8,0,0,1-8,8H224v16a8,8,0,0,1-16,0V160H192a8,8,0,0,1,0-16h16V128a8,8,0,0,1,16,0v16h16A8,8,0,0,1,248,152Z"></path>
                    </svg>
                    <span>Generate</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-[var(--surface-panels)]" href="submission.html">
                    <svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M184,32H72A16,16,0,0,0,56,48V224a8,8,0,0,0,12.24,6.78L128,193.43l59.77,37.35A8,8,0,0,0,200,224V48A16,16,0,0,0,184,32Z"></path>
                    </svg>
                    <span>Submit</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-[var(--surface-panels)]" href="viewer.html">
                    <svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M213.66,82.34l-56-56A8,8,0,0,0,152,24H56A16,16,0,0,0,40,40V216a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V88A8,8,0,0,0,213.66,82.34Z"></path>
                    </svg>
                    <span>View</span>
                </a>
            </nav>
        </div>
    </aside>
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="relative mb-8">
            <input id="searchInput" class="w-full bg-[var(--surface-panels)] text-white placeholder-[var(--text-secondary)] rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-[var(--secondary-accent)]" placeholder="Search for blueprints, e.g. 'React component with props'" type="text"/>
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-secondary)]">
                <svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path>
                </svg>
            </div>
        </div>
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-white mb-4">Blueprints</h2>
            <div id="blueprintsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="text-center text-[var(--text-secondary)] py-8">
                    Loading blueprints...
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
<script src="js/index.js"></script>
</body>
</html>
