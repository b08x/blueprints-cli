---
version: "3.8"

# BlueprintsCLI Development Docker Compose Configuration
# This configuration optimizes for development workflow with:
# - Hot reloading for backend and frontend
# - Debug ports exposed
# - Volume mounts for live code editing
# - Development database with sample data
# - Simplified networking for debugging

services:
  # Development Frontend Server
  frontend-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: blueprintscli_frontend_dev
    restart: unless-stopped
    volumes:
      - ../frontend/pages:/usr/share/nginx/html/pages
      - ../frontend/public:/usr/share/nginx/html/public
      - ./configs/nginx/development.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_DEV_PORT:-8080}:8080"
    networks:
      - blueprintscli-dev
    depends_on:
      - backend-dev

  # Development Backend API with Hot Reloading
  backend-dev:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: blueprintscli_backend_dev
    restart: unless-stopped
    environment:
      RACK_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres-dev:5432/${POSTGRES_DB:-blueprints_development}
      REDIS_URL: redis://redis-dev:6379/0

      # Development Configuration
      LOG_LEVEL: debug
      RELOAD_CODE: true
      DEBUG: true

      # AI Service Configuration (for testing)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Application Configuration
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      SESSION_SECRET: dev-session-secret

      # Development Features
      ENABLE_CORS: true
      ENABLE_LOGGING: true
      PRETTY_LOGGING: true
    ports:
      - "${BACKEND_DEV_PORT:-3000}:3000"
      - "${RUBY_DEBUG_PORT:-9229}:9229" # Debug port for Ruby debugging
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_started
    volumes:
      - ../backend:/app
      - backend_dev_gems:/usr/local/bundle
      - backend_dev_logs:/app/log
    networks:
      - blueprintscli-dev
    command: >
      bash -c "
        bundle install --retry 5 --jobs 4 &&
        bundle exec rake db:create &&
        bundle exec rake db:migrate &&
        echo 'Starting application server...' &&
        bundle exec rerun --background --signal TERM 'rackup config.ru -o 0.0.0.0 -p 3000 -s webrick'
      "

  # Development Database with Sample Data
  postgres-dev:
    image: pgvector/pgvector:pg16
    container_name: blueprintscli_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blueprints_development}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_DEV_PORT:-5433}:5432" # Different port to avoid conflicts
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./configs/postgres/init-scripts:/docker-entrypoint-initdb.d
      - ../db/schemas:/docker-entrypoint-initdb.d/schemas
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-blueprints_development}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blueprintscli-dev
    logging: &logging-dev
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # Development Redis
  redis-dev:
    image: redis:7-alpine
    container_name: blueprintscli_redis_dev
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "${REDIS_DEV_PORT:-6380}:6379" # Different port to avoid conflicts
    volumes:
      - redis_dev_data:/data
    networks:
      - blueprintscli-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *logging-dev

  # Database Management Tool (Adminer)
  adminer:
    image: adminer:latest
    container_name: blueprintscli_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-dev
      ADMINER_DESIGN: dracula
    networks:
      - blueprintscli-dev
    profiles:
      - with-adminer
    logging: *logging-dev

  # Mail Catcher for Development Email Testing
  mailcatcher:
    image: dockage/mailcatcher:latest
    container_name: blueprintscli_mailcatcher
    restart: unless-stopped
    ports:
      - "${MAILCATCHER_WEB_PORT:-1080}:1080" # Web interface
      - "${MAILCATCHER_SMTP_PORT:-1025}:1025" # SMTP server
    networks:
      - blueprintscli-dev
    profiles:
      - with-mail
    logging: *logging-dev

  # Development Reverse Proxy (Optional, for testing production-like routing)
  nginx-dev:
    image: nginx:alpine
    container_name: blueprintscli_nginx_dev
    restart: unless-stopped
    ports:
      - "${NGINX_DEV_PORT:-8000}:80"
    volumes:
      - ./configs/nginx/development.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-dev
      - frontend-dev
    networks:
      - blueprintscli-dev
    profiles:
      - with-proxy
    logging: *logging-dev

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  backend_dev_gems:
    driver: local
  backend_dev_logs:
    driver: local

networks:
  blueprintscli-dev:
    driver: bridge
    name: blueprintscli-dev
# Quick start commands embedded as comments:
#
# Start basic development environment:
# docker compose -f docker/docker-compose.dev.yml up
#
# Start with database admin tool:
# docker compose -f docker/docker-compose.dev.yml --profile with-adminer up
#
# Start with all development tools:
# docker compose -f docker/docker-compose.dev.yml --profile with-adminer --profile with-mail up
#
# Reset development database:
# docker compose -f docker/docker-compose.dev.yml down postgres-dev
# docker volume rm blueprintscli_postgres_dev_data
# docker compose -f docker/docker-compose.dev.yml up postgres-dev
#
# Access services:
# - Frontend: http://localhost:8080
# - Backend API: http://localhost:3000/api
# - Database: localhost:5433 (postgres/dev_password)
# - Redis: localhost:6380
# - Adminer: http://localhost:8081 (with --profile with-adminer)
# - MailCatcher: http://localhost:1080 (with --profile with-mail)
