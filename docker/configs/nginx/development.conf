# BlueprintsCLI Development Nginx Configuration
# Optimized for development workflow with detailed logging and debugging

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Enable detailed logging for development
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log combined;

    # Security headers (relaxed for development)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS Headers for development (allow all origins)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Disable caching for development
    location ~* \.(html|css|js|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API proxy to backend (development)
    location ^~ /api/ {
        proxy_pass http://backend-dev:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Development proxy settings (more verbose)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        
        # Add debug headers
        add_header X-Debug-Backend "backend-dev:3000" always;
        add_header X-Debug-Request-ID "$request_id" always;
    }

    # Health check proxy
    location = /health {
        proxy_pass http://backend-dev:3000/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        add_header X-Debug-Backend "backend-dev:3000" always;
    }

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
        
        # Add debug headers
        add_header X-Debug-Served-By "frontend-dev" always;
        add_header X-Debug-File "$document_root$uri" always;
    }

    # Special handling for SPA routes (fallback to index.html)
    location ~* ^/(generator|viewer|submission)(/.*)?$ {
        try_files $uri $uri/ /index.html;
    }

    # Favicon handling
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }

    # Development assets with no caching
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Error handling with detailed information for development
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
        return 404 "404 Not Found - Development Mode\n";
    }

    location = /50x.html {
        internal;
        return 500 "5xx Server Error - Development Mode\nCheck backend logs for details.\n";
    }

    # Allow .well-known for certbot (if needed)
    location ^~ /.well-known/ {
        allow all;
        root /var/www/certbot;
    }
}