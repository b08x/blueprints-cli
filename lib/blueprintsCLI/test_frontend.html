<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Test</title>
</head>
<body>
    <h1>Testing Frontend API Integration</h1>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            
            try {
                resultsDiv.innerHTML = '<p>Testing API connection...</p>';
                
                // Test the API directly
                const response = await fetch('/api/blueprints');
                const data = await response.json();
                
                console.log('API Response:', data);
                
                // Test using the app.js method
                const app = {
                    baseUrl: '',
                    apiUrl: '/api',
                    async request(url, options = {}) {
                        const config = {
                            headers: {
                                'Content-Type': 'application/json',
                                ...options.headers
                            },
                            ...options
                        };

                        const response = await fetch(this.apiUrl + url, config);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        return await response.json();
                    },
                    async getBlueprints(query = '') {
                        const url = query ? `/blueprints?query=${encodeURIComponent(query)}` : '/blueprints';
                        const response = await this.request(url);
                        // The API returns {blueprints: [...], total: N, query: "..."} 
                        // but the frontend expects just the array of blueprints
                        return response.blueprints || response;
                    }
                };
                
                const blueprints = await app.getBlueprints();
                
                resultsDiv.innerHTML = `
                    <h2>✅ Success!</h2>
                    <p><strong>API Response Structure:</strong></p>
                    <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                    <p><strong>Processed Blueprints Count:</strong> ${blueprints.length}</p>
                    <p><strong>Sample Blueprint:</strong></p>
                    <pre>${JSON.stringify(blueprints[0], null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('Test failed:', error);
                resultsDiv.innerHTML = `
                    <h2>❌ Error</h2>
                    <p>${error.message}</p>
                `;
            }
        }
        
        // Run test when page loads
        testAPI();
    </script>
</body>
</html>
