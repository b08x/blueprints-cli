---
# BlueprintsCLI Configuration
# Generated by setup wizard on 2026-03-20 02:03:43

# Database Configuration
database:
  url: postgresql://postgres:blueprints@localhost:5432/blueprints
  pool_size: 5

# AI Provider Configuration
ai:
  provider: OpenAI
  model: minimax/minimax-m2.5
  rubyllm:
    default_model: minimax/minimax-m2.5
    default_embedding_model: embeddinggemma
    default_image_model: imagen-3.0-generate-002
    ollama_api_base: http://tinybot:11434
    request_timeout: 120
    max_retries: 3
    retry_interval: 0.5
    retry_backoff_factor: 2
    retry_interval_randomness: 0.5
    log_level: info
    log_assume_model_exists: false
    openai_api_base: https://openrouter.ai/api/v1
  openai:
    log_errors: true
  embedding_model: embeddinggemma

# Logging Configuration
logger:
  level: info
  file_logging: true
  file_level: debug
  file_path: /home/b08x/.local/state/BlueprintsCLI/app.log
  context_enabled: true
  context_detail_level: full
  context_cache_size: 1000

editor:
  default: micro
  auto_save: true
  temp_dir: /tmp

ui:
  colors: true
  interactive: true
  pager: most
  auto_pager: true

features:
  auto_description: true
  auto_categorize: true
  improvement_analysis: true
  vector_search: true

search:
  default_limit: 10
  semantic_search: true
  text_search_fallback: true

export:
  include_metadata: false
  auto_detect_extension: true

performance:
  batch_size: 100
  connection_pool_size: 5
